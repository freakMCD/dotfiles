bar:
 location: top
 margin: 10
 spacing: 12
 font: JetBrainsMono Nerd Font:pixelsize=12px:style=bold
 
 height: 18
 background: 00000099

 left:
    - network:
        content:
          map:
            default: {empty: {}}
            conditions:
              name == enp34s0:
                map:
                  conditions:
                    ~carrier: {empty: {}}
                    carrier:
                      map:
                        default: {string: {text: offline, foreground: e78a4eff}}
                        conditions:
                          state == up && ipv4 != "": {string: {text: online, foreground: 89b482ff}}
 center:
   - script:
       path: /usr/bin/playerctl
       args:
         - "--follow"
         - "metadata"
         - "-f"
         - |
           status|string|{{status}}
           playerName|string|{{playerName}}
           artist|string|{{artist}}
           title|string|{{title}}
       content:
         map:
           conditions:
             status == Paused:
              map:
                default: {string: {text: "{artist} - {title}", foreground: FF6F6199}}
                conditions:
                  playerName == "mpd": {string: {text: "{artist} - {title}", foreground: d3869b99}}
                  playerName == "mpv": {string: {text: "{artist} - {title}", foreground: 00bbcc99}}

             status == Playing:
              map:
                default: {string: {text: "{artist} - {title}", foreground: FF6F61FF}}
                conditions:
                  playerName == "mpd": {string: {text: "{artist} - {title}", foreground: d3869bff}}
                  playerName == "mpv": {string: {text: "{artist} - {title}", foreground: 00bbccFF}}

 right:
   - cpu:
       poll-interval: 3000
       content:
         map:
           conditions:
             id < 0:
               - string: 
                  text: "CPU "
                  foreground: d8a657ff
               - string:
                  text: "{cpu}%"

   - mem:
       poll-interval: 3000
       content:
         - string: {text: "RAM ", foreground: d8a657ff}
         - string: {text: "{used:mb} MB"}


   - clock:
       date-format: "%a"
       content:
         - string: {text: "{date} ", foreground: d8a657ff}
         - string: {text: "{time}"}
