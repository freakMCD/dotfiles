#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,auto,bitdepth,10

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = waybar & mpc random on && mpc add / & fnott

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
$terminal = foot

# Some default env vars.
env = XCURSOR_SIZE,24
env = Q1_QPA_PLATFORMTHEME,qt6ct # change to qt6ct if you have that
env = XDG_SESSION_TYPE,wayland
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = es

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    special_fallthrough = yes
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 0
    gaps_out = 0
    border_size = 2

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

group {
    col.border_active = rgba(CBA6F7C8) rgba(A6E3A1C8) 45degb
    col.border_inactive = rgba(1e1e1eC8) rgba(A6E3A1C8) 45degb
    
    groupbar {
      enabled = false
    }
}

decoration {
    blur:enabled=no
    drop_shadow=false
    dim_special = 0.15
}

animations {
  enabled = true

  animation = workspaces, 1, 3, default
  animation = windows, 1, 3, default, slide
  animation = border, 0

}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = no # you probably want this
    special_scale_factor = 0.5
    force_split = 2
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

binds {
    workspace_back_and_forth = true
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 2 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_splash_rendering = false
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrulev2 = float,class:(^(steam|r2modman|floating)$)
windowrulev2 = rounding 8, class:(floating)
windowrulev2 = keepaspectratio, class:(mpv)
windowrulev2 = noinitialfocus, class:(mpv)
windowrulev2 = noanim, class:(Rofi)

windowrulev2 = workspace 1,class:(zathura)
windowrulev2 = workspace 2,class:(foot|qutebrowser)
windowrulev2 = workspace 10,class:(mpv)

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER
bind = $mainMod, A, exec, jerry

workspace = special:launcher, on-created-empty:foot ~/bin/lib/launcher-desktop.sh
workspace = special:trans, on-created-empty:foot trans -4 -I 
workspace = special:neomutt, on-created-empty:foot neomutt
workspace = special:newsraft, on-created-empty:foot newsraft
workspace = special:utilities, on-created-empty:foot ~/bin/utilities.sh
workspace = special:floatterm, on-created-empty:TMOUT=0 foot

bind = $mainMod, less, workspace, 10
bind = $mainMod SHIFT, KP_Insert, movetoworkspace, special:mpv
bind = $mainMod, R, togglespecialworkspace, launcher
bind = $mainMod, KP_End, togglespecialworkspace, trans 
bind = $mainMod, KP_Down, togglespecialworkspace, neomutt 
bind = $mainMod, KP_Next, togglespecialworkspace, newsraft
bind = $mainMod, KP_Begin, togglespecialworkspace, utilities 
bind = $mainMod, KP_Home, togglespecialworkspace, floatterm 

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, C, killactive, 
bind = $mainMod, F, fullscreen
bind = $mainMod, F4, exec, pkill -15 '(qutebrowser|zathura)'; hyprctl notify 0 5000 "rgb(00aaee)" "   Shutting down"; paplay /usr/share/sounds/freedesktop/stereo/service-logout.oga; sleep 3; shutdown now
bind = $mainMod, M, exec, killall -9 Hyprland 
bind = $mainMod, V, togglesplit, # dwindle
bind = $mainMod, S, exec, hyprctl dispatch pin
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, Space, togglefloating, 

# Media control
bind = MOD5, P, exec, mpc toggle &,
bind = MOD5, left, exec, mpc prev &, 
bind = MOD5, right, exec, mpc next &,
bindl = $mainMod, P, exec, playerctl play-pause
bindl = $mainMod, left, exec, playerctl position 5-
bindl = $mainMod, right, exec, playerctl position 5+
bindl = $mainMod, Z, exec, playerctl stop

# Screenshots
bind = , print, exec, grim -t jpeg - | wl-copy
bind = SHIFT, print, exec, grim -g "$(hyprctl -j activewindow | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" - | wl-copy
bind = CTRL, print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, print, exec, hyprctl -j activewindow | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"' | grim -g - ~/MediaHub/screenshots/$(date +%s).jpg

# Recording
bind = CTRL ALT,R,exec, ~/bin/lib/record-script.sh

binde = MOD5, up, exec, ~/bin/lib/volume_notif.sh up
binde = MOD5, down, exec, ~/bin/lib/volume_notif.sh down
bind = MOD5, delete, exec, ~/bin/lib/volume_notif.sh mute
bind = $mainMod, delete, exec, ~/bin/lib/volume_notif.sh mic

# waybar keys
bind = $mainMod SHIFT, B, exec, killall waybar && waybar # Reload waybar
bind = $mainMod, B, exec, killall -SIGUSR1 waybar # Hide waybar

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# groups
bind=$mainMod,g,togglegroup
bind=$mainMod,u,moveoutofgroup
bind=$mainMod,TAB,changegroupactive, f
bind=$mainMod SHIFT,TAB,changegroupactive, b

# Move window with mainMod + motion keys
bind = $mainMod SHIFT, h, movewindoworgroup, l
bind = $mainMod SHIFT, l, movewindoworgroup, r
bind = $mainMod SHIFT, k, movewindoworgroup, u
bind = $mainMod SHIFT, j, movewindoworgroup, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

