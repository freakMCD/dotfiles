#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,auto,bitdepth,10

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

$pypr=~/.local/share/virtualenv/pyprland/bin/pypr
# Execute your favorite apps at launch
exec-once = waybar & mpc random on && mpc add /
exec-once = $pypr
# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
$terminal = foot
$menu = foot --app-id="floating" --title="launcher"  ~/bin/lib/launcher-desktop.sh

# Some default env vars.
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct # change to qt6ct if you have that

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = es
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    special_fallthrough = yes
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 0
    gaps_out = 0
    border_size = 1

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}


decoration:blur:enabled = no

animations {
  enabled = true

  animation = workspaces, 1, 3, default
  animation = windows, 1, 3, default, slide
  animation = border, 0

}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = no # you probably want this
    special_scale_factor = 0.95
    force_split = 2
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = True
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 2 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_splash_rendering = false
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device:epic-mouse-v1 {
    sensitivity = -0.5
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrulev2 = nomaximizerequest, class:.* # You'll probably like this.
windowrulev2 = float,class:(^(steam|r2modman|floating)$)
windowrulev2 = rounding 8, class:(floating)
windowrulev2 = keepaspectratio, class:(mpv)
windowrulev2 = workspace special:mpv, class:(mpv)
windowrulev2 = workspace special:launcher, title:(launcher)

windowrulev2 = workspace 1,class:(zathura)
windowrulev2 = workspace 2,class:(foot)
windowrulev2 = workspace 3,class:(qutebrowser)

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

bind = $mainMod, KP_Down, exec, $pypr toggle neomutt 
bind = $mainMod, KP_Next, exec, $pypr toggle newsraft
bind = $mainMod, KP_Home, exec, $pypr toggle floatterm 
bind = $mainMod, KP_Begin, exec, $pypr toggle utilities 
bind = $mainMod, KP_End, exec, $pypr toggle trans 
bind = $mainMod, KP_Insert, togglespecialworkspace, mpv

bind = $mainMod, E, exec, $pypr toggle yazi

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive, 
bind = $mainMod, M, exec, killall -9 Hyprland 
bind = $mainMod, Space, togglefloating, 
bind = $mainMod, R, exec, $menu
bind = $mainMod SHIFT, R, exec, foot --app-id="floating" --title "launcher" ~/bin/lib/fzf-steam.sh
bind = $mainMod, F4, exec, pkill -15 '(qutebrowser|zathura)'; notify-send "System Shutdown" "Shutting down in 5s"; paplay /usr/share/sounds/freedesktop/stereo/service-logout.oga; sleep 5; shutdown now

# Media control
bind = $mainMod, P, exec, mpc toggle &,
bind = $mainMod, left, exec, mpc prev &, 
bind = $mainMod, right, exec, mpc next &,
bindl = MOD5, P, exec, playerctl play-pause
bindl = MOD5, left, exec, playerctl position 5-
bindl = MOD5, right, exec, playerctl position 5+
bindl = MOD5, Q, exec, playerctl stop

# groups
bind=$mainMod,g,togglegroup
bind=$mainMod SHIFT,g,moveoutofgroup
bind=$mainMod,TAB,changegroupactive

bind = $mainMod, V, togglesplit, # dwindle
bind = $mainMod, F, fullscreen

# Screenshots
bind = , print, exec, grim -t jpeg - | wl-copy
bind = SHIFT, print, exec, grim -g "$(hyprctl -j activewindow | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" - | wl-copy
bind = CTRL, print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, print, exec, hyprctl -j activewindow | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"' | grim -g - ~/MediaHub/screenshots/$(date +%s).jpg

# Recording
bind = CTRL ALT,R,exec, ~/bin/lib/record-script.sh

binde = MOD5, up, exec, ~/bin/lib/volume_notif.sh up
binde = MOD5, down, exec, ~/bin/lib/volume_notif.sh down
bind = MOD5, delete, exec, ~/bin/lib/volume_notif.sh mute
bind = $mainMod, delete, exec, ~/bin/lib/volume_notif.sh mic

# waybar keys
bind = $mainMod SHIFT, B, exec, killall waybar && waybar # Reload waybar
bind = $mainMod, B, exec, killall -SIGUSR1 waybar # Hide waybar

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move window with mainMod + motion keys
bind = $mainMod SHIFT, h, movewindoworgroup, l
bind = $mainMod SHIFT, l, movewindoworgroup, r
bind = $mainMod SHIFT, k, movewindoworgroup, u
bind = $mainMod SHIFT, j, movewindoworgroup, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, S, exec, hyprctl dispatch pin
