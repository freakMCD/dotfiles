# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/main/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  aliases:
    global:
      q: close
      qa: quit
      w: session-save
      wq: quit --save
      wqa: quit --save
  auto_save.session:
    global: true
  bindings.commands:
    global:
      command:
        <Escape>: mode-enter normal;; set statusbar.show in-mode
        <Return>: command-accept;; set statusbar.show in-mode
      hint:
        f: mode-leave
      normal:
        ',F': hint links spawn --detach mpv {hint-url}
        ',f': hint videos spawn --detach mpv {hint-url} --profile=fastYT
        ',m': hint videos userscript qute-mpv
        ',p': hint --rapid videos spawn --userscript add-to-mpv-playlist {hint-url}
        /: set statusbar.show always;; cmd-set-text /
        ':': 'set statusbar.show always;; cmd-set-text :'
        <Space><Space>: config-cycle colors.webpage.darkmode.enabled true false;;
          config-cycle content.user_stylesheets [] ['~/.config/qutebrowser/css/gruvbox-all-sites.css']
        <Space>a: config set content.blocking.whitelist+='*://*.reddit.com/*'
        <Space>b: config-cycle tabs.show switching always
        <Space>js: config-cycle content.javascript.enabled true false
        <Space>v: config-source ;; message-info 'qutebrowser reloaded'
        I: hint inputs
        J: tab-prev
        K: tab-next
        O: set statusbar.show always;; cmd-set-text -s :open -t
        Sd: bookmark-delSD
        aF: config-list-add content.blocking.whitelist *.facebook.com;; hint links;;cmd-later
          10000 config-list-remove content.blocking.whitelist *.facebook.com
        af: config-list-add content.blocking.whitelist *.facebook.com;; hint links;;cmd-later
          10000 config-list-remove content.blocking.whitelist *.facebook.com
        gD: open -t https://discord.com/channels/@me
        gW: open -t https://web.whatsapp.com
        gd: open https://discord.com/channels/@me
        gw: open https://web.whatsapp.com
        i: hint --first inputs
        j: scroll-px 0 200
        k: scroll-px 0 -200
        l: scroll-px 100 0
        o: set statusbar.show always;; cmd-set-text -s :open
        q: null
        quickmark-del/: set statusbar.show always;; cmd-set-text /
        zl: spawn --userscript qute-pass
        zol: spawn --userscript qute-pass --otp-only
        zpl: spawn --userscript qute-pass --password-only
        zul: spawn --userscript qute-pass --username-only
      passthrough:
        <Alt+1>: tab-focus 1
        <Alt+2>: tab-focus 2
        <Alt+3>: tab-focus 3
        <Alt+4>: tab-focus 4
        <Alt+5>: tab-focus 5
        <Alt+6>: tab-focus 6
        <Alt+7>: tab-focus 7
        <Alt+8>: tab-focus 8
        <Alt+9>: tab-focus 9
        <Alt+Left>: back
        <Alt+Right>: forward
        <Ctrl+Shift+z>: mode-leave
  colors.webpage.darkmode.enabled:
    global: true
  colors.webpage.darkmode.policy.images:
    global: never
  colors.webpage.darkmode.policy.page:
    global: always
  colors.webpage.darkmode.threshold.background:
    global: 205
  colors.webpage.darkmode.threshold.foreground:
    global: 150
  colors.webpage.preferred_color_scheme:
    global: dark
  completion.open_categories:
    global:
    - searchengines
    - quickmarks
    - bookmarks
  completion.show:
    global: always
  completion.shrink:
    global: true
  completion.timestamp_format:
    global: '%Y-%m-%d %H:%M'
  content.blocking.adblock.lists:
    global:
    - https://easylist.to/easylist/easylist.txt
    - https://easylist.to/easylist/easyprivacy.txt
    - https://secure.fanboy.co.nz/fanboy-cookiemonster.txt
    - https://github.com/uBlockOrigin/uAssets/raw/master/filters/unbreak.txt
    - https://github.com/uBlockOrigin/uAssets/raw/master/filters/privacy.txt
    - https://raw.githubusercontent.com/Sinfonietta/hostfiles/master/pornography-hosts
  content.blocking.whitelist:
    global:
    - '*://web.whatsapp.com/*'
    - '*://*.whatsapp.net/*'
  content.desktop_capture:
    https://discord.com: true
    https://meet.google.com: true
    https://meet.jit.si: true
  content.fullscreen.window:
    global: true
  content.headers.user_agent:
    global: Mozilla/5.0 ({os_info}) AppleWebKit/{webkit_version} (KHTML, like Gecko)
      {qt_key}/{qt_version} {upstream_browser_key}/{upstream_browser_version} Safari/{webkit_version}
    onedrive.live.com: Mozilla/5.0 ({os_info}; rv:71.0) Gecko/20100101 Firefox/71.0
  content.javascript.enabled:
    '*://*.accounts.google.com/*': true
    '*://*.anilist.co/*': true
    '*://*.bancaporinternet.interbank.pe/*': true
    '*://*.chatgpt.com/*': true
    '*://*.checkout.steampowered.com/*': true
    '*://*.codeberg.org/*': true
    '*://*.docs.google.com/*': true
    '*://*.due.moe/*': true
    '*://*.feedcontrol.fivefilters.org/*': true
    '*://*.github.com/*': true
    '*://*.math.stackexchange.com/*': true
    '*://*.piped.adminforge.de/*': true
    '*://*.piped.lunar.icu/*': true
    '*://*.piped.privacydev.net/*': true
    '*://*.soundbible.com/*': true
    '*://*.store.epicgames.com/*': true
    '*://*.store.steampowered.com/*': true
    '*://*.suv2.unitru.edu.pe/*': true
    '*://*.tramites-uraa.unitru.edu.pe/*': true
    '*://*.twitter.com/*': true
    '*://*.uraa.unitru.edu.pe/*': true
    '*://*.www.epicgames.com/*': true
    '*://*.www.nerdfonts.com/*': true
    '*://*.www.protondb.com/*': true
    '*://*.www.shellcheck.net/*': true
    '*://*.www.unitru.edu.pe/*': true
    '*://*.www.webtoons.com/*': true
    '*://archive.org/*': true
    '*://aulavirtual2.unitru.edu.pe/*': true
    '*://bugreports.qt.io/*': true
    '*://chat.openai.com/*': true
    '*://createfeed.fivefilters.org/*': true
    '*://discord.com/*': true
    '*://drive.google.com/*': true
    '*://duckduckgo.com/*': true
    '*://filterlists.com/*': true
    '*://gds.google.com/*': true
    '*://gitlab.archlinux.org/*': true
    '*://gitlab.com/*': true
    '*://hollowknight.wiki/*': true
    '*://jqplay.org/*': true
    '*://lite.duckduckgo.com/*': true
    '*://localhost/*': true
    '*://mail.google.com/*': true
    '*://mangareader.to/*': true
    '*://mega.nz/*': true
    '*://piped.smnz.de/*': true
    '*://stackoverflow.com/*': true
    '*://steamcommunity.com/*': true
    '*://store.epicgames.com/*': false
    '*://unitru.edu.pe/*': true
    '*://web.whatsapp.com/*': true
    '*://wolfreealpha.gitlab.io/*': true
    '*://www.facebook.com/*': true
    '*://www.google.com.br/*': true
    '*://www.google.com/*': true
    '*://www.speedrun.com/*': true
    '*://www.twitch.tv/*': true
    '*://www.wolframalpha.com/*': true
    '*://www.youtube.com/*': true
    global: true
  content.media.audio_capture:
    https://app.zoom.us: false
    https://discord.com: true
    https://meet.google.com: true
  content.media.audio_video_capture:
    https://meet.google.com: true
    https://meet.jit.si: true
  content.media.video_capture:
    https://app.zoom.us: false
    https://meet.google.com: true
  content.notifications.enabled:
    https://www.bennish.net: true
    https://www.facebook.com: false
  content.pdfjs:
    global: true
  content.register_protocol_handler:
    https://mail.google.com?extsrc=mailto&url=%25s: false
  content.user_stylesheets:
    global:
    - ~/.config/qutebrowser/css/gruvbox-all-sites.css
  content.webgl:
    global: true
  downloads.prevent_mixed_content:
    global: true
  fonts.default_family:
    global: JetBrainsMono Nerd Font
  fonts.default_size:
    global: 10pt
  fonts.web.size.default:
    global: 16
  hints.chars:
    global: asdghzxcvn
  hints.leave_on_load:
    global: true
  input.insert_mode.auto_load:
    global: false
  prompt.radius:
    global: 8
  qt.chromium.experimental_web_platform_features:
    global: auto
  qt.chromium.low_end_device_mode:
    global: auto
  qt.chromium.process_model:
    global: process-per-site-instance
  qt.environ:
    global: null
  qt.force_platform:
    global: null
  qt.force_software_rendering:
    global: none
  qt.highdpi:
    global: false
  qt.workarounds.disable_accelerated_2d_canvas:
    global: never
  statusbar.show:
    global: in-mode
  tabs.background:
    global: true
  tabs.close_mouse_button:
    global: middle
  tabs.favicons.show:
    global: always
  tabs.last_close:
    global: ignore
  tabs.max_width:
    global: 200
  tabs.position:
    global: left
  tabs.show:
    global: always
  tabs.show_switching_delay:
    global: 800
  tabs.title.alignment:
    global: left
  tabs.title.elide:
    global: right
  tabs.title.format:
    global: '{audio}{index}: {current_title}'
  tabs.title.format_pinned:
    global: '{index}'
  tabs.tooltips:
    global: true
  tabs.width:
    global: 3%
  url.default_page:
    global: https://lite.duckduckgo.com/
